
version: 2

models:
  - name: stg_transform
    description: "choose columns and add new columns"
    columns:
      - name: reviewId
        description: "The primary key for this table"
        data_tests:
          - unique
          - not_null
      - name: score
        description: "The name of the user"
        data_type: integer
        data_tests:
          - accepted_values = [0, 1, 2, 3, 4, 5]
      